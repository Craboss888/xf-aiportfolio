<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c5fc4"/>
      <stop offset=".45" stop-color="#4f97dd"/>
      <stop offset=".78" stop-color="#a7d2ef"/>
      <stop offset="1" stop-color="#cfe8f6"/>
    </linearGradient>
    <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#79b93c"/>
      <stop offset="1" stop-color="#4e9427"/>
    </linearGradient>
    <linearGradient id="hill" x1=".15" y1="0" x2=".6" y2="1">
      <stop offset="0" stop-color="#9ed44c"/>
      <stop offset=".38" stop-color="#63b02d"/>
      <stop offset=".75" stop-color="#3c8a1f"/>
      <stop offset="1" stop-color="#2a6d17"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="16"/></filter>
    <filter id="softer" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="26"/></filter>
